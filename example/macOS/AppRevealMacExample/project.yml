name: AppRevealMacExample
options:
  bundleIdPrefix: com.appreveal
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"

packages:
  AppReveal:
    path: ../../../iOS

targets:
  AppRevealMacExample:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Navigation
      - path: Screens
      - path: Services
      - path: Models
    dependencies:
      - package: AppReveal
        product: AppReveal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.appreveal.macos.example
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Info.plist
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGN_IDENTITY: ""
