name: appreveal
description: Debug-only MCP framework for Flutter — gives LLM agents native app control via standard MCP protocol.
version: 0.1.0
homepage: https://github.com/your-org/appreveal

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  nsd: ^2.0.0
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
